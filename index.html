<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Scroll Experience</title>
<style>
  body {
    margin: 0;
    background-color: #000; /* Black background for cinematic feel */
    color: #fff;
    font-family: 'Helvetica Neue', Arial, sans-serif; /* Minimalist typography */
    overflow-x: hidden;
  }
  
  .section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: cover;
    background-position: center;
    background-attachment: fixed; /* Basic Parallax effect */
    position: relative;
  }

  /* Dummy backgrounds - Replace url with actual Iron Man images */
  .sec-1 { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1920&auto=format&fit=crop'); }
  .sec-2 { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1502899576159-f224dc2349fa?q=80&w=1920&auto=format&fit=crop'); }
  .sec-3 { background-color: #050505; }

  .content {
    text-align: center;
    z-index: 10;
  }

  .fade-text {
    font-size: 5rem;
    font-weight: 700;
    opacity: 0; /* Hidden initially */
    transform: translateY(50px); /* Pushed down slightly */
    transition: opacity 1s ease-out, transform 1s ease-out;
    margin: 0;
  }

  .sub-text {
    font-size: 1.5rem;
    color: #f39c12; /* Accent color similar to Iron Man UI */
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease-out 0.3s, transform 1s ease-out 0.3s; /* Slight delay */
  }

  /* Classes added by JavaScript when scrolling */
  .fade-text.visible, .sub-text.visible {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

  <div class="section sec-1">
    <div class="content">
      <h1 class="fade-text">I am Iron Man.</h1>
    </div>
  </div>

  <div class="section sec-2">
    <div class="content">
      <h1 class="fade-text">Build with Kryntix</h1>
      <p class="sub-text">Advanced UI interactions</p>
    </div>
  </div>

  <div class="section sec-3">
    <div class="content">
      <h1 class="fade-text">I am Inevitable.</h1>
    </div>
  </div>

  <script>
    // This simple JavaScript checks when an element comes into the screen view
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.3 }); // Triggers when 30% of the element is visible

    // Apply the observer to all text we want to fade in
    document.querySelectorAll('.fade-text, .sub-text').forEach(element => {
      observer.observe(element);
    });
  </script>

</body>
</html>
